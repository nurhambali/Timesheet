version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:./dev.db"
      JWT_SECRET: "super-secret-key"
      TELEGRAM_BOT_TOKEN: ""
    volumes:
      - ./apps/server/prisma:/app/apps/server/prisma

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
    depends_on:
      - server
